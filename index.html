<!DOCTYPE html>
<html lang="sw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zepox Omni Tech Finder</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <meta name="theme-color" content="#1a1a1a">
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Zepox App">
    <link rel="apple-touch-icon" href="logo.jpg">

    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --green: #22c55e;
            --yellow: #eab308;
            --bg: #051a0d;
            --liquid-glass: rgba(255, 255, 255, 0.08);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background: radial-gradient(circle at top left, #064e3b, #051a0d);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- ADS SLIDER MPYA --- */
        .ads-container {
            margin: 15px 20px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--liquid-glass);
            position: relative;
            display: none;
            backdrop-filter: blur(10px);
        }

        .ads-label {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 10px;
            z-index: 100;
            color: var(--yellow);
            border: 0.5px solid var(--yellow);
        }

        .ads-slider-wrapper {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }

        .ad-slide {
            min-width: 100%;
            position: relative;
            height: 200px;
        }

        .ad-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.6);
        }

        .ad-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
            box-sizing: border-box;
        }

        .ad-title {
            color: var(--yellow);
            font-weight: bold;
            font-size: 16px;
            margin: 0;
        }

        .ad-desc {
            font-size: 11px;
            opacity: 0.9;
            margin: 5px 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .ad-link-btn {
            display: inline-block;
            background: var(--green);
            color: white;
            padding: 6px 15px;
            border-radius: 8px;
            font-size: 12px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 5px;
        }

        /* Splash Screen */
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .iaa-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 10px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--yellow);
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.3);
        }

        .branding {
            font-size: 10px;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-top: 10px;
        }

        .selection-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 80%;
            margin-top: 30px;
        }

        .select-btn {
            background: var(--liquid-glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .select-btn i {
            font-size: 24px;
            color: var(--yellow);
            margin-bottom: 10px;
            display: block;
        }

        /* List View */
        .list-card {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--liquid-glass);
            margin: 12px 20px;
            padding: 12px;
            border-radius: 20px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .list-img-thumb {
            width: 75px;
            height: 75px;
            border-radius: 15px;
            object-fit: cover;
        }

        /* Detail View */
        #detail-view {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 2500;
            overflow-y: auto;
            padding-bottom: 100px;
        }

        .slider {
            width: 100%;
            height: 260px;
            overflow: hidden;
            position: relative;
        }

        .slides {
            display: flex;
            width: 400%;
            height: 100%;
            animation: slide 12s infinite;
        }

        .slides img {
            width: 25%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes slide {

            0%,
            20% {
                transform: translateX(0);
            }

            25%,
            45% {
                transform: translateX(-25%);
            }

            50%,
            70% {
                transform: translateX(-50%);
            }

            75%,
            95% {
                transform: translateX(-75%);
            }

            100% {
                transform: translateX(0);
            }
        }

        .btn-back {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 2600;
            background: rgba(0, 0, 0, 0.5);
            padding: 12px;
            border-radius: 50%;
            color: white;
        }

        .content-body {
            padding: 25px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 8px;
        }

        .photo-btn {
            background: var(--liquid-glass);
            border: 1px solid var(--yellow);
            color: white;
            padding: 15px;
            border-radius: 15px;
            width: 100%;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            font-weight: bold;
        }

        #image-viewer {
            display: none;
            position: fixed;
            z-index: 4000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
        }

        #image-viewer img {
            max-width: 95%;
            max-height: 80%;
            transition: transform 0.3s;
            cursor: zoom-in;
        }

        .close-viewer {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 30px;
            color: white;
            cursor: pointer;
        }

        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            padding: 15px;
            z-index: 2000;
        }

        .nav-item {
            position: relative;
            font-size: 20px;
        }

        .active-drop {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%) rotate(45deg);
            width: 8px;
            height: 8px;
            background: var(--yellow);
            border-radius: 0 50% 50% 50%;
            display: none;
            box-shadow: 0 0 10px var(--yellow);
        }

        .nav-item.active .active-drop {
            display: block;
        }

        .dish-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.04);
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 15px;
        }

        .dish-img {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            object-fit: cover;
        }

        .star-active {
            color: var(--yellow);
            font-size: 11px;
        }

        .star-inactive {
            color: #222;
            font-size: 11px;
        }
    </style>
</head>

<body>
    <div id="install-banner"
        style="display:none; background:var(--yellow); color:black; padding:15px; text-align:center; font-weight:bold; position:sticky; top:0; z-index:9999; border-bottom:2px solid rgba(0,0,0,0.1);">
        <span id="install-text">Pakua App ya Zepox kwenye simu yako!</span>
        <button id="install-button"
            style="margin-left:10px; padding:8px 15px; border-radius:10px; border:none; background:black; color:white; font-weight:bold;">DOWNLOAD</button>
        <button onclick="document.getElementById('install-banner').style.display='none'"
            style="background:none; border:none; margin-left:10px; font-size:18px;">✕</button>
    </div>

    <div id="splash">
        <img src="iaa.jpg" class="iaa-logo">
        <div style="font-size: 12px; color: var(--yellow);">IAA BABATI CAMPUS</div>
        <h2 style="margin: 5px 0;">Zepox Omni Tech</h2>
        <p class="branding">Sponsored by Micho</p>
        <div class="selection-container">
            <div class="select-btn" onclick="enterApp('Rooms')"><i class="fa fa-bed"></i><b>TAFUTA CHUMBA</b></div>
            <div class="select-btn" onclick="enterApp('Food')"><i class="fa fa-utensils"></i><b>FOOD POINT</b></div>
        </div>
    </div>

    <div id="image-viewer">
        <span class="close-viewer" onclick="closeViewer()">&times;</span>
        <img id="full-res-img" onclick="toggleZoom(this)">
        <p style="position:absolute; bottom:20px; font-size:12px; opacity:0.6;">Gusa picha kukuza (Zoom)</p>
    </div>

    <div id="app-content" style="display:none; padding-top: 20px; padding-bottom: 120px;">
        <div style="text-align: center; margin-bottom: 10px;">
            <img src="iaa.jpg"
                style="width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1px solid var(--yellow);">
            <h3 id="view-title" style="margin:5px 0; color:var(--yellow); font-weight: 600;">Finder</h3>
        </div>

        <div class="ads-container" id="ads-box">
            <div class="ads-label">SPONSORED ADS</div>
            <div class="ads-slider-wrapper" id="ads-track"></div>
        </div>

        <div id="list-container"></div>
    </div>

    <div id="detail-view">
        <div class="btn-back" onclick="closeDetails()"><i class="fa fa-arrow-left"></i></div>
        <div class="slider">
            <div class="slides" id="main-slider"></div>
        </div>
        <div class="content-body" id="detail-body"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" id="nav-Rooms" onclick="switchTab('Rooms')">
            <div class="active-drop"></div>🏠
        </div>
        <div class="nav-item" id="nav-Food" onclick="switchTab('Food')">
            <div class="active-drop"></div>🍲
        </div>
        <div class="nav-item" onclick="location.reload()">🔄</div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxC7l2pTDeHza5E5swDKV3l1tIaiIxsG0tqnO3iwObniDoducyQbpNLEzAjNcgoeNShfg/exec";
        let currentTab = 'Rooms', allData = [], selectedStars = 0, deferredPrompt;

        // --- SEHEMU YA PWA & INSTALL POP-UP (MPYA) ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log("SW Registration failed:", err));
            });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            showInstallBanner("Android");
        });

        function showInstallBanner(platform) {
            const banner = document.getElementById('install-banner');
            const text = document.getElementById('install-text');
            const btn = document.getElementById('install-button');

            if (banner) banner.style.display = 'block';

            if (platform === "iPhone" && text) {
                text.innerText = "Kwa iPhone: Bonyeza 'Share' kisha 'Add to Home Screen' 📲";
                if (btn) btn.style.display = 'none';
            }

            if (btn) {
                btn.onclick = async () => {
                    if (deferredPrompt) {
                        deferredPrompt.prompt();
                        const { outcome } = await deferredPrompt.userChoice;
                        if (outcome === 'accepted') banner.style.display = 'none';
                        deferredPrompt = null;
                    }
                };
            }
        }

        const isIos = /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
        const isStandalone = window.navigator.standalone === true;
        if (isIos && !isStandalone) showInstallBanner("iPhone");

        // --- LOGIC YAKO YA AWALI (BILA KUGUSA HATA NUKTA) ---
        function enterApp(t) {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            switchTab(t);
            loadAds(); // Itapakia cache kwanza kisha itatafuta updates
        }

        // --- MPYA: ADS WITH LOCAL STORAGE & SILENT UPDATES ---
        async function loadAds() {
            const adsTrack = document.getElementById('ads-track');
            const adsBox = document.getElementById('ads-box');

            // 1. Jaribu kupakia kutoka LocalStorage kwanza (Speed)
            const cachedAds = localStorage.getItem('zepox_ads_cache');
            if (cachedAds) {
                renderAdsHTML(JSON.parse(cachedAds));
            }

            // 2. Tafuta updates kimya kimya kutoka kwenye Sheet
            try {
                const r = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "getData", payload: { sheetName: "matangazo" } })
                });
                const j = await r.json();

                if (j.data && j.data.length >= 4) {
                    const adsData = j.data;
                    const slots = [
                        { photo: adsData[0].photo1, link: adsData[1].photo1, kichwa: adsData[2].photo1, maelezo: adsData[3].photo1 },
                        { photo: adsData[0].photo2, link: adsData[1].photo2, kichwa: adsData[2].photo2, maelezo: adsData[3].photo2 },
                        { photo: adsData[0].photo3, link: adsData[1].photo3, kichwa: adsData[2].photo3, maelezo: adsData[3].photo3 },
                        { photo: adsData[0].photo4, link: adsData[1].photo4, kichwa: adsData[2].photo4, maelezo: adsData[3].photo4 }
                    ].filter(item => item.photo && item.photo !== "");

                    // Linganisha na cache, kama ni tofauti, update na save
                    if (JSON.stringify(slots) !== cachedAds) {
                        localStorage.setItem('zepox_ads_cache', JSON.stringify(slots));
                        renderAdsHTML(slots);
                    }
                }
            } catch (e) { console.log("Ads Silent Update Error:", e); }
        }

        function renderAdsHTML(slots) {
            const track = document.getElementById('ads-track');
            let html = '';
            slots.forEach(ad => {
                const buttonHTML = (ad.link && ad.link !== "" && ad.link !== "undefined")
                    ? `<a href="${ad.link}" target="_blank" class="ad-link-btn">Fungua Link</a>`
                    : "";
                html += `
        <div class="ad-slide">
            <img src="${ad.photo}">
            <div class="ad-info">
                <p class="ad-title">${ad.kichwa || "Zepox Omni Tech"}</p>
                <p class="ad-desc">${ad.maelezo || "Huduma Bora kwa Wakati."}</p>
                ${buttonHTML}
            </div>
        </div>`;
            });
            if (html !== '') {
                track.innerHTML = html;
                document.getElementById('ads-box').style.display = 'block';
                startAdsAnimation(slots.length);
            }
        }

        function startAdsAnimation(count) {
            let index = 0;
            if (count <= 1) return;
            // Futa interval ya zamani kama ipo kuzuia speed kuongezeka
            if (window.adsInterval) clearInterval(window.adsInterval);
            window.adsInterval = setInterval(() => {
                index = (index + 1) % count;
                document.getElementById('ads-track').style.transform = `translateX(-${index * 100}%)`;
            }, 5000);
        }

        function getStoredData(tab) {
            const cached = localStorage.getItem('zepox_cache_' + tab);
            return cached ? JSON.parse(cached) : null;
        }

        function updateNavUI() {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if (document.getElementById('nav-' + currentTab)) document.getElementById('nav-' + currentTab).classList.add('active');
        }

        function getStarsHTML(val) {
            let starsCount = Math.floor(val / 20);
            if (starsCount > 5) starsCount = 5;
            let h = '';
            for (let i = 1; i <= 5; i++) {
                h += `<i class="fa fa-star ${i <= starsCount ? 'star-active' : 'star-inactive'}"></i>`;
            }
            return h;
        }

        async function loadData() {
            const cachedData = getStoredData(currentTab);
            if (cachedData) { allData = cachedData; renderList(); }

            try {
                const r = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "getData", payload: { sheetName: currentTab } })
                });
                const j = await r.json();

                const rc = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "getData", payload: { sheetName: "Comments" } })
                });
                const jc = await rc.json();
                const allComments = jc.data || [];

                allData = j.data.map(item => {
                    const count = allComments.filter(c => c.targetName === item.jina || c.targetname === item.jina).length;
                    return { ...item, rating: count };
                });

                localStorage.setItem('zepox_cache_' + currentTab, JSON.stringify(allData));
                renderList();
            } catch (e) { console.log("Error:", e); }
        }

        function renderList() {
            if (allData.length === 0) return;
            document.getElementById('list-container').innerHTML = allData.map((item, i) => `
    <div class="list-card" onclick="openDetails(${i})">
        <img src="${item.picha1}" class="list-img-thumb">
        <div style="flex:1">
            <h4 style="margin:0; font-size:16px;">${item.jina}</h4>
            <div style="margin:4px 0;">
                <small style="color:var(--yellow); font-weight:bold;">📍 ${item.umbali} kutoka IAA</small>
            </div>
            <small style="opacity:0.6; font-size:11px;">
                ${currentTab === 'Rooms' ? 'Tsh ' + item.bei + '/=' : 'Chakula & Vinywaji'}
            </small>
        </div>
    </div>`).join('');
        }

        function openDetails(i) {
            const item = allData[i];
            const body = document.getElementById('detail-body');
            document.getElementById('main-slider').innerHTML = `<img src="${item.picha1}"><img src="${item.picha2}"><img src="${item.picha3}"><img src="${item.picha4}">`;

            let detailsHTML = `<h2 style="color:var(--yellow); margin-bottom:5px;">${item.jina}</h2>
                       <div class="info-row"><span>📍 Umbali:</span> <b>${item.umbali}</b></div>`;

            if (currentTab === 'Rooms') {
                detailsHTML += `<div class="info-row"><span>🏠 Aina:</span> <b>${item.aina}</b></div>
                       <div class="info-row"><span>🚪 Idadi:</span> <b>${item.idadi || '1'}</b></div>
                       <h3 style="color:var(--green);">Tsh ${item.bei}/=</h3>
                       <button onclick="bookRoom(${i})" style="width:100%; padding:18px; border-radius:20px; background:var(--green); border:none; color:white; font-weight:bold;">AGIZA CHUMBA 🏨</button>`;
            } else {
                detailsHTML += `
    <div class="photo-btn" onclick="openViewer('${item.mida}')"><span><i class="fa fa-clock"></i> Mida ya Kazi</span><i class="fa fa-expand"></i></div>
    <div class="photo-btn" onclick="openViewer('${item.menu}')"><span><i class="fa fa-book-open"></i> Picha ya Menu</span><i class="fa fa-expand"></i></div>
    <div class="info-row"><span>🚚 Delivery:</span> <b>${item.delivery || 'Ipo'}</b></div>
    <button onclick="showMenu('${item.jina}')" style="width:100%; padding:18px; border-radius:20px; background:var(--yellow); border:none; font-weight:bold;">AGIZA CHAKULA (LIST)</button>
    <div id="menu-area" style="margin-top:20px;"></div>`;
            }

            detailsHTML += `
    <div style="margin-top:30px; border-top:1px solid rgba(255,255,255,0.1); padding-top:20px;">
        <h4>Maoni & Ukadiriaji</h4>
        <div style="margin:10px 0;">Rating: ${getStarsHTML(item.rating)}</div>
        <div style="margin:10px 0;" id="star-input">${[1, 2, 3, 4, 5].map(n => `<i class="fa fa-star" style="font-size:25px; color:#333;" onclick="setRating(${n})"></i>`).join('')}</div>
        <input type="text" id="c_name" placeholder="Jina lako" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; background:rgba(255,255,255,0.1); border:none; color:white;">
        <textarea id="c_text" placeholder="Andika maoni..." style="width:100%; padding:12px; border-radius:10px; background:rgba(255,255,255,0.1); border:none; color:white;"></textarea>
        <button onclick="submitComment('${item.jina}')" style="width:100%; padding:12px; margin-top:10px; border-radius:10px; background:var(--yellow); border:none; font-weight:bold;">TUMA MAONI</button>
        <div id="comments-display" style="margin-top:20px;"></div>
    </div>`;

            body.innerHTML = detailsHTML;
            document.getElementById('detail-view').style.display = 'block';
            loadComments(item.jina);
        }

        async function bookRoom(i) {
            const item = allData[i];
            const simuMteja = prompt("Weka namba yako ya simu 📞:");
            if (!simuMteja) return;
            const nambaAdmin = "255747712469";
            const ujumbeWA = `🏨 *MAOMBI YA CHUMBA*\n\n🏠 *Nyumba:* ${item.jina}\n💰 *Bei:* Tsh ${item.bei}/=\n📞 *Mteja:* ${simuMteja}`;
            window.location.href = `https://api.whatsapp.com/send?phone=${nambaAdmin}&text=${encodeURIComponent(ujumbeWA)}`;
        }

        function openViewer(url) {
            if (!url || url === 'undefined') return alert("Picha bado haijawekwa!");
            document.getElementById('full-res-img').src = url;
            document.getElementById('image-viewer').style.display = 'flex';
        }

        function closeViewer() { document.getElementById('image-viewer').style.display = 'none'; }

        async function showMenu(restName) {
            const area = document.getElementById('menu-area');
            area.innerHTML = "Inapakia Menu...";
            try {
                const r = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "getData", payload: { sheetName: "DishList" } }) });
                const j = await r.json();
                const dishes = j.data.filter(d => d.mgahawa === restName || d.Mgahawa === restName);
                area.innerHTML = dishes.map((d, index) => `
            <div class="dish-card">
                <img src="${d.picha || d.Picha}" class="dish-img">
                <div style="flex:1"><b>${d.jinalachakula || d['jina la chakula']}</b><br><small>Tsh ${d.bei}/=</small></div>
                <button onclick="placeOrder('${restName}', '${d.jinalachakula || d['jina la chakula']}', '${d.bei}', ${index})" style="background:var(--green); border:none; color:white; padding:5px 10px; border-radius:8px;">AGIZA</button>
            </div>`).join('') || "Orodha haipo kwa sasa.";
            } catch (e) { area.innerHTML = "Tatizo la mtandao."; }
        }

        async function submitComment(target) {
            const name = document.getElementById('c_name').value, text = document.getElementById('c_text').value;
            if (!name || !text || !selectedStars) return alert("Tafadhali jaza jina, maoni na nyota!");

            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({ action: "addComment", payload: { targetName: target, userName: name, commentText: text, userStars: selectedStars } })
                });
                alert("Asante kwa maoni yako!");
                document.getElementById('c_name').value = '';
                document.getElementById('c_text').value = '';
                loadComments(target);
            } catch (e) { alert("Imeshindikana kutuma."); }
        }

        async function loadComments(target) {
            try {
                const r = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "getData", payload: { sheetName: "Comments" } }) });
                const j = await r.json();
                const filtered = j.data.filter(c => c.targetName === target || c.targetname === target);
                document.getElementById('comments-display').innerHTML = filtered.map(c => `
            <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:12px; margin-bottom:10px;">
                <b>${c.userName || c.username}</b> ${'⭐'.repeat(c.userStars || c.userstars)}
                <p style="margin:5px 0; opacity:0.8;">${c.commentText || c.commenttext}</p>
            </div>`).join('') || "Kuwa wa kwanza kutoa maoni!";
            } catch (e) { document.getElementById('comments-display').innerHTML = "Maoni hayakupatikana."; }
        }

        function switchTab(t) {
            currentTab = t;
            allData = [];
            document.getElementById('list-container').innerHTML = `<div style="text-align:center; padding:50px;">Inapakia data...</div>`;
            updateNavUI();
            loadData();
            document.getElementById('view-title').innerText = t === 'Rooms' ? 'Vyumba Karibu na IAA' : 'Migahawa & Chakula';
        }

        function closeDetails() { document.getElementById('detail-view').style.display = 'none'; }

        function setRating(n) {
            selectedStars = n;
            document.querySelectorAll('#star-input i').forEach((s, i) => s.style.color = i < n ? '#eab308' : '#333');
        }
    </script>
</body>

</html>
